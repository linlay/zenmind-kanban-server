services:
  kanban-server:
    build: .
    expose:
      - "8080"
    environment:
      ZENMIND_KANBAN_ADDR: "${ZENMIND_KANBAN_ADDR:-:8080}"
      ZENMIND_KANBAN_DB: "${ZENMIND_KANBAN_CONTAINER_DB:-/data/kanban.db}"
      ZENMIND_KANBAN_ALLOWED_ORIGINS: "${ZENMIND_KANBAN_ALLOWED_ORIGINS:-*}"
      ZENMIND_KANBAN_TOKEN: "${ZENMIND_KANBAN_TOKEN:-}"
    volumes:
      - kanban_data:/data
    networks:
      - kanban-internal
    restart: unless-stopped

volumes:
  kanban_data:

networks:
  kanban-internal:
    name: "${ZENMIND_KANBAN_DOCKER_NETWORK:-zenmind-kanban-net}"
    external: true
